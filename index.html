<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitchmap — Player Career Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="logo">
        <span class="logo-icon">⚽</span>
        <span class="logo-text">Pitchmap</span>
      </div>
      <div class="search-container">
        <input type="text" id="search" placeholder="Search a player..." autocomplete="off" />
        <div id="suggestions" class="suggestions"></div>
      </div>
      <button id="share-btn" class="share-btn" style="display:none">Share ↗</button>
    </header>
    <div id="globe-container"></div>
    <div id="player-panel" class="player-panel hidden">
      <div class="player-header">
        <div class="player-flag" id="player-flag"></div>
        <div class="player-info">
          <h1 id="player-name"></h1>
          <p id="player-subtitle"></p>
        </div>
        <div class="player-stats-summary">
          <div class="stat-pill"><span id="stat-clubs">0</span><label>Clubs</label></div>
          <div class="stat-pill"><span id="stat-goals">0</span><label>Goals</label></div>
          <div class="stat-pill"><span id="stat-apps">0</span><label>Apps</label></div>
        </div>
      </div>
      <div id="career-timeline" class="career-timeline"></div>
    </div>
    <div id="club-popup" class="club-popup hidden">
      <button class="popup-close" onclick="closePopup()">×</button>
      <div class="popup-flag" id="popup-flag"></div>
      <h3 id="popup-club"></h3>
      <p id="popup-years"></p>
      <div class="popup-stats">
        <div><span id="popup-apps"></span><label>Apps</label></div>
        <div><span id="popup-goals"></span><label>Goals</label></div>
      </div>
    </div>
    <div id="landing" class="landing">
      <h2>Track every step of a<br/>footballer's journey</h2>
      <p>Search for a player to see their career mapped across the globe</p>
      <div class="player-chips">
        <button class="chip" onclick="selectPlayer('Zlatan Ibrahimović')">Zlatan Ibrahimović</button>
        <button class="chip" onclick="selectPlayer('Cristiano Ronaldo')">Cristiano Ronaldo</button>
        <button class="chip" onclick="selectPlayer('Lionel Messi')">Lionel Messi</button>
        <button class="chip" onclick="selectPlayer('Ronaldinho')">Ronaldinho</button>
        <button class="chip" onclick="selectPlayer('Thierry Henry')">Thierry Henry</button>
        <button class="chip" onclick="selectPlayer('Neymar')">Neymar</button>
        <button class="chip" onclick="selectPlayer('Erling Haaland')">Erling Haaland</button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/globe.gl@2.30.0/dist/globe.gl.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
